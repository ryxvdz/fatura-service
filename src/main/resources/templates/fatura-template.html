<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Documento</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<h2>Resumo da Conta</h2>
<p><strong>Nome:</strong> <span th:text="${cliente.contaNome}"></span></p>
<p><strong>Cartão:</strong> <span th:text="${cliente.contaCartao}"></span></p>

<table>
    <thead>
    <tr>
        <th>Data e Hora</th>
        <th>Comerciante</th>
        <th>Valor (R$)</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="tx : ${transacoes}">
        <td th:text="${#temporals.format(tx.dataHota, 'dd/MM/yyyy HH:mm')}"></td>

        <td th:text="${tx.comerciante}"></td>

        <td th:text="${#numbers.formatDecimal(tx.valor, 1, 'POINT', 2, 'COMMA')}"></td>
    </tr>
    </tbody>
</table>

<h3 style="text-align: right;">
    Total: R$ <span th:text="${#numbers.formatDecimal(total, 1, 'POINT', 2, 'COMMA')}"></span>
</h3>
</body>
</html>
